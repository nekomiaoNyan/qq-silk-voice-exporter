name: build-windows

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configure
        run: cmake -S . -B build -A x64 -DQQ_SILK_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test malformed-input handling
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package auditable binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/package | Out-Null
          Copy-Item build/Release/qq-silk.exe dist/package/
          Copy-Item scripts/Convert-QQVoice.ps1 dist/package/
          Copy-Item README.md,README.en.md,THIRD_PARTY_NOTICES.md,LICENSE dist/package/
          Copy-Item LICENSES dist/package/LICENSES -Recurse
          $files = Get-ChildItem dist/package -File -Recurse | Sort-Object FullName
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $relative = [IO.Path]::GetRelativePath((Resolve-Path dist/package), $file.FullName).Replace('\', '/')
            "$hash  $relative"
          }
          $lines | Set-Content dist/package/SHA256SUMS.txt -Encoding ascii
          Compress-Archive -Path dist/package/* -DestinationPath dist/qq-silk-windows-x64.zip

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/qq-silk-windows-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qq-silk-windows-x64
          path: dist/qq-silk-windows-x64.zip
          if-no-files-found: error
